<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geography Quiz</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #111827;
    color: #e5e7eb;
    overflow-x: hidden;
  }

  .launch-icon {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    display: block;
    background-image: url("icon.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    z-index: 9999;
  }

  .app-container {
    display: flex;
    flex-direction: row;
    gap: 16px;
    padding: 60px 16px 16px 16px;
    box-sizing: border-box;
  }

  .left-panel {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .left-panel h2 {
    margin: 0 0 8px 0;
    font-size: 1rem;
    color: #9ca3af;
  }

  .mode-btn {
    width: 100%;
    padding: 8px 10px;
    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    text-align: left;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .mode-btn:hover {
    background: #111827;
  }

  .best-score {
    font-size: 0.8rem;
    color: #9ca3af;
  }

  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #target-display {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .map-container {
    width: 100%;
    max-width: 900px;
    border: 1px solid #374151;
    background: #020617;
    position: relative;
  }

  .right-panel {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .controls button {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .controls button:hover {
    background: #111827;
  }

  #remaining-container {
    flex: 1;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 6px;
    overflow-y: auto;
    background: #020617;
  }

  #remaining-container h3 {
    margin: 0 0 4px 0;
    font-size: 0.9rem;
    color: #9ca3af;
  }

  #remaining-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 0.85rem;
  }

  #remaining-ul li {
    padding: 2px 0;
  }

  #remaining-ul li.done {
    text-decoration: line-through;
    color: #6b7280;
  }

  #mode-label, #score {
    font-size: 0.9rem;
  }

  #mode-label span {
    font-weight: 600;
  }

  .country-pending {
    cursor: pointer;
  }

  .country-correct {
    cursor: default;
  }

  .country-wrong {
    animation: flashWrong 0.5s;
  }

  @keyframes flashWrong {
    0% { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  #click-label {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: #facc15;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 99999;
    display: none;
    transform: translate(-50%, -120%);
    white-space: nowrap;
  }

  #end-screen {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
  }

  #end-box {
    background: #020617;
    border: 1px solid #374151;
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
    max-width: 320px;
  }

  #end-text {
    white-space: pre-line;
    margin-bottom: 12px;
    font-size: 1rem;
  }

  #save-score-btn, #close-end-btn {
    padding: 8px 12px;
    margin: 4px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  #save-score-btn:hover, #close-end-btn:hover {
    background: #111827;
  }

  /* optional visual border overlay if you still want it */
  #ws-border {
    position: absolute;
    width: 2px;
    height: 120px;
    background: black;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<a class="launch-icon" href="https://nathanm32712.github.io/Launch-deck/launch-deck.html"></a>

<div id="click-label"></div>

<div id="end-screen">
  <div id="end-box">
    <div id="end-text"></div>
    <button id="save-score-btn">Save Score</button>
    <button id="close-end-btn">Close</button>
  </div>
</div>

<div class="app-container">

  <div class="left-panel">
    <h2>Quizzes</h2>
    <button class="mode-btn" data-mode="Africa"><span>Africa</span><span class="best-score" id="best-Africa"></span></button>
    <button class="mode-btn" data-mode="Asia"><span>Asia</span><span class="best-score" id="best-Asia"></span></button>
    <button class="mode-btn" data-mode="Europe"><span>Europe</span><span class="best-score" id="best-Europe"></span></button>
    <button class="mode-btn" data-mode="MiddleEast"><span>Middle East</span><span class="best-score" id="best-MiddleEast"></span></button>
    <button class="mode-btn" data-mode="NorthAmerica"><span>North America</span><span class="best-score" id="best-NorthAmerica"></span></button>
    <button class="mode-btn" data-mode="Oceania"><span>Oceania</span><span class="best-score" id="best-Oceania"></span></button>
    <button class="mode-btn" data-mode="SouthAmerica"><span>South America</span><span class="best-score" id="best-SouthAmerica"></span></button>
    <button class="mode-btn" data-mode="USStates"><span>US States</span><span class="best-score" id="best-USStates"></span></button>
    <button class="mode-btn" data-mode="USCapitals"><span>US Capitals</span><span class="best-score" id="best-USCapitals"></span></button>
    <button class="mode-btn" data-mode="World"><span>World Map</span><span class="best-score" id="best-World"></span></button>
  </div>

  <div class="center-panel">
    <div id="target-display">Find: <span id="target">—</span></div>
    <div class="map-container">
      <div id="ws-border"></div>
      <svg id="world-svg" viewBox="0 0 2000 1000" style="display:block;">

      </svg>
      <svg id="usa-svg" viewBox="0 0 1000 600" style="display:none;">

      </svg>
    </div>
  </div>

  <div class="right-panel">
    <div class="controls">
      <button id="start-btn">Start / Reset</button>
      <button id="skip-btn">Skip</button>
    </div>
    <div id="remaining-container">
      <h3>Remaining</h3>
      <ul id="remaining-ul"></ul>
    </div>
    <div id="mode-label">Mode: <span>None</span></div>
    <div id="score">Score: 0.00 / 0 (0%)</div>
  </div>

</div>

const REGIONS = {
  World: null,
  Africa: [
    "dz","ao","cf","td","cg","ci","cm","cd","dj","eg","er","et","ga","gm","gh",
    "gn","gq","gw","ke","lr","ls","ly","mg","ml","mr","mw","mz","na","ne","ng","rw",

  ],
  Europe: [
    "al","at","ba","be","bg","by","ch","cy","cz","de","dk","ee","es","fi","fr","gb",
    "gr","hr","hu","ie","is","it","lv","lt","lu","md","me","mk","mt","nl","no","pl",
    "pt","ro","rs","se","si","sk","ua"
  ],
  Asia: [
    "af","am","az","bd","bn","bt","cn","ge","id","il","in","iq","ir","jo","jp",

  ],

  ]

const worldSvg = document.getElementById("world-svg");
const usaSvg = document.getElementById("usa-svg");
const targetSpan = document.getElementById("target");
const scoreSpan = document.getElementById("score");
const modeLabel = document.querySelector("#mode-label span");
const remainingUl = document.getElementById("remaining-ul");
const startBtn = document.getElementById("start-btn");
const skipBtn = document.getElementById("skip-btn");
const clickLabel = document.getElementById("click-label");
const endScreen = document.getElementById("end-screen");
const endText = document.getElementById("end-text");
const saveScoreBtn = document.getElementById("save-score-btn");
const closeEndBtn = document.getElementById("close-end-btn");
const wsBorderDiv = document.getElementById("ws-border");

/* real fused SVG id + virtual ids */
const JOINED_MA_ID = "ma";   // actual SVG path id
const VIRTUAL_WEST_ID = "eh";

let worldIds = [];
let usaIds = [];
let currentMode = "World";
let gameActive = false;
let correctScore = 0;
let questionsAnswered = 0;
let wrongAttempts = 0;

let remainingIds = [];       // for world + USStates (IDs)
let remainingCapitals = [];  // for USCapitals (capital names)
let currentTargetId = null;  // world + USStates
let currentTargetCapital = null; // USCapitals

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? parseFloat(match[2]) : null;
}

function setCookie(name, value) {
  document.cookie = `${name}=${value};path=/;max-age=31536000`;
}

function loadBestScores() {
  const modes = [
    "Africa","Asia","Europe","MiddleEast","NorthAmerica",
    "Oceania","SouthAmerica","USStates","USCapitals","World"
  ];
  modes.forEach(m => {
    const best = getCookie("best_" + m);
    const span = document.getElementById("best-" + m);
    if (span) span.textContent = best != null ? `Best: ${best}%` : "";
  });
}

function initWorldMap() {
  const elements = worldSvg.querySelectorAll("path[id], g[id]");
  worldIds = [];
  elements.forEach(el => {
    const id = el.id.trim().toLowerCase();
    el.dataset.cid = id;
    if (COUNTRY_NAMES[id]) {
      worldIds.push(id);
      el.addEventListener("click", ev => handleClickWorld(id, ev));
    } else {
      el.style.display = "none";
    }
  });
  REGIONS.World = [...worldIds];
  // ensure Western Sahara is part of World logically even if no separate SVG path
  if (!REGIONS.World.includes(VIRTUAL_WEST_ID)) {
    REGIONS.World.push(VIRTUAL_WEST_ID);
  }
}

function initUsaMap() {
  const elements = usaSvg.querySelectorAll("path[id], g[id]");
  usaIds = [];
  elements.forEach(el => {
    const id = el.id.trim().toUpperCase();
    el.dataset.usid = id;
    if (USA_STATES[id]) {
      usaIds.push(id);
      el.addEventListener("click", ev => handleClickUsa(id, ev));
    } else {
      el.style.display = "none";
    }
  });
}

function resetStylesWorld(activeIds) {
  const elements = worldSvg.querySelectorAll("[data-cid]");
  elements.forEach(el => {
    const id = el.dataset.cid;
    el.classList.remove("country-correct","country-wrong","country-pending");
    if (COUNTRY_NAMES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      if (el.tagName.toLowerCase() === "g") {
        el.querySelectorAll("path").forEach(p => p.style.fill = "#4caf50");
      } else {
        el.style.fill = "#4caf50";
      }
    } else {
      el.style.display = "none";
    }
  });
}

function resetStylesUsa(activeIds) {
  const elements = usaSvg.querySelectorAll("[data-usid]");
  elements.forEach(el => {
    const id = el.dataset.usid;
    el.classList.remove("country-correct","country-wrong","country-pending");
    if (USA_STATES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      if (el.tagName.toLowerCase() === "g") {
        el.querySelectorAll("path").forEach(p => p.style.fill = "#4caf50");
      } else {
        el.style.fill = "#4caf50";
      }
    } else {
      el.style.display = "none";
    }
  });
}

function updateScore() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  scoreSpan.textContent = `Score: ${correctScore.toFixed(2)} / ${questionsAnswered} (${percent.toFixed(0)}%)`;
}

function updateRemainingList() {
  remainingUl.innerHTML = "";

  if (currentMode === "USCapitals") {
    const sortedCaps = [...remainingCapitals].sort((a,b) => a.localeCompare(b));
    sortedCaps.forEach(cap => {
      const li = document.createElement("li");
      li.textContent = cap;
      if (!remainingCapitals.includes(cap)) li.classList.add("done");
      remainingUl.appendChild(li);
    });
    return;
  }

  let namesMap;
  if (currentMode === "USStates") {
    namesMap = USA_STATES;
  } else {
    namesMap = COUNTRY_NAMES;
  }

  const sorted = [...remainingIds].sort((a,b) =>
    (namesMap[a] || a).localeCompare(namesMap[b] || b)
  );

  sorted.forEach(id => {
    const li = document.createElement("li");
    li.textContent = namesMap[id] || id;
    if (!remainingIds.includes(id)) li.classList.add("done");
    remainingUl.appendChild(li);
  });
}

function showEndScreen() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  endText.textContent = `FINAL SCORE\n${percent.toFixed(2)}%\n(${correctScore.toFixed(2)} / ${questionsAnswered})`;
  endScreen.style.display = "flex";
}

function colorWorld(id, color) {
  // map virtual Western Sahara to real Morocco path
  const realId = (id === VIRTUAL_WEST_ID) ? JOINED_MA_ID : id;
  const el = worldSvg.querySelector(`[data-cid="${realId}"]`);
  if (!el) return;
  if (el.tagName.toLowerCase() === "g") {
    el.querySelectorAll("path").forEach(p => p.style.fill = color);
  } else {
    el.style.fill = color;
  }
}

function colorUsa(id, color) {
  const el = usaSvg.querySelector(`[data-usid="${id}"]`);
  if (!el) return;
  if (el.tagName.toLowerCase() === "g") {
    el.querySelectorAll("path").forEach(p => p.style.fill = color);
  } else {
    el.style.fill = color;
  }
}

function showClickLabel(name, x, y) {
  clickLabel.textContent = name;
  clickLabel.style.left = x + "px";
  clickLabel.style.top = y + "px";
  clickLabel.style.display = "block";
  clearTimeout(clickLabel.hideTimer);
  clickLabel.hideTimer = setTimeout(() => {
    clickLabel.style.display = "none";
  }, 1000);
}

/* virtual split bbox for arrow or future use */
const virtualCountries = {
  [JOINED_MA_ID]: {
    realId: JOINED_MA_ID,
    region: "north"
  },
  [VIRTUAL_WEST_ID]: {
    realId: JOINED_MA_ID,
    region: "south"
  }
};

function getVirtualBBox(countryId) {
  const v = virtualCountries[countryId];
  if (!v) return null;

  const el = worldSvg.querySelector(`[data-cid="${v.realId}"]`);
  if (!el) return null;

  const box = el.getBBox();

  if (v.region === "north") {
    return {
      x: box.x,
      y: box.y,
      width: box.width,
      height: box.height * 0.55
    };
  }

  if (v.region === "south") {
    return {
      x: box.x,
      y: box.y + box.height * 0.55,
      width: box.width,
      height: box.height * 0.45
    };
  }

  return box;
}

function pointArrowAtVirtual(countryId) {
  const box = getVirtualBBox(countryId);
  if (!box) return;
  const arrow = document.getElementById("arrow");
  if (!arrow) return;
  arrow.style.left = (box.x + box.width / 2) + "px";
  arrow.style.top = (box.y - 40) + "px";
}

function placeWesternSaharaBorder() {
  if (!wsBorderDiv) return;
  // you can tweak these manually to line up visually
  wsBorderDiv.style.left = "345px";
  wsBorderDiv.style.top = "210px";
}

function chooseNextTarget() {
  if (currentMode === "USCapitals") {
    if (remainingCapitals.length === 0) {
      currentTargetCapital = null;
      targetSpan.textContent = "Done!";
      gameActive = false;
      showEndScreen();
      return;
    }
    const idx = Math.floor(Math.random() * remainingCapitals.length);
    currentTargetCapital = remainingCapitals[idx];
    targetSpan.textContent = currentTargetCapital;
    wrongAttempts = 0;
    return;
  }

  placeWesternSaharaBorder();

  if (remainingIds.length === 0) {
    currentTargetId = null;
    targetSpan.textContent = "Done!";
    gameActive = false;
    showEndScreen();
    return;
  }
  const idx = Math.floor(Math.random() * remainingIds.length);
  currentTargetId = remainingIds[idx];

  if (currentMode === "USStates") {
    targetSpan.textContent = USA_STATES[currentTargetId];
  } else {
    targetSpan.textContent = COUNTRY_NAMES[currentTargetId];
  }
  wrongAttempts = 0;
}

function zoomToIds(svg, ids) {
  if (!ids || ids.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  ids.forEach(id => {
    const selector = svg === worldSvg ? `[data-cid="${id === VIRTUAL_WEST_ID ? JOINED_MA_ID : id}"]` : `[data-usid="${id}"]`;
    const el = svg.querySelector(selector);
    if (!el) return;
    const b = el.getBBox();
    minX = Math.min(minX, b.x);
    minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.width);
    maxY = Math.max(maxY, b.y + b.height);
  });
  if (!isFinite(minX)) return;
  const padding = 40;
  const x = minX - padding;
  const y = minY - padding;
  const w = (maxX - minX) + padding * 2;
  const h = (maxY - minY) + padding * 2;
  svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
}

function handleCorrect(addScore, id, isUsa) {
  if (isUsa) {
    colorUsa(id, addScore === 1 ? "#2d6a4f" : addScore === 2/3 ? "#ffd166" : addScore === 1/3 ? "#ff8c42" : "#ff0000");
    const el = usaSvg.querySelector(`[data-usid="${id}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  } else {
    colorWorld(id, addScore === 1 ? "#2d6a4f" : addScore === 2/3 ? "#ffd166" : addScore === 1/3 ? "#ff8c42" : "#ff0000");
    const realId = (id === VIRTUAL_WEST_ID) ? JOINED_MA_ID : id;
    const el = worldSvg.querySelector(`[data-cid="${realId}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  }

  correctScore += addScore;
  questionsAnswered++;
  updateScore();
}

/* decide which half of the fused shape was clicked */
function resolveVirtualIdFromClick(baseId, ev) {
  if (baseId !== JOINED_MA_ID) return baseId;

  const el = worldSvg.querySelector(`[data-cid="${JOINED_MA_ID}"]`);
  if (!el) return baseId;

  const rect = el.getBoundingClientRect();
  if (rect.height === 0) return baseId;

  const localY = (ev.clientY - rect.top) / rect.height;

  // top = Morocco, bottom = Western Sahara
  if (localY <= 0.55) {
    return JOINED_MA_ID;   // Morocco
  } else {
    return VIRTUAL_WEST_ID; // Western Sahara
  }
}

function handleClickWorld(id, ev) {
  const logicalId = resolveVirtualIdFromClick(id, ev);
  const name = COUNTRY_NAMES[logicalId] || logicalId;
  showClickLabel(name, ev.clientX, ev.clientY);

  if (!gameActive) return;
  if (!currentTargetId || currentMode === "USStates" || currentMode === "USCapitals") return;

  if (logicalId === currentTargetId) {
    let add = 0;
    if (wrongAttempts === 0) add = 1;
    else if (wrongAttempts === 1) add = 2/3;
    else if (wrongAttempts === 2) add = 1/3;
    else add = 0;

    handleCorrect(add, logicalId, false);
    remainingIds = remainingIds.filter(x => x !== logicalId);
    updateRemainingList();
    chooseNextTarget();
  } else {
    wrongAttempts++;
    const realId = (logicalId === VIRTUAL_WEST_ID) ? JOINED_MA_ID : logicalId;
    const el = worldSvg.querySelector(`[data-cid="${realId}"]`);
    if (el) {
      el.classList.add("country-wrong");
      setTimeout(() => el.classList.remove("country-wrong"), 500);
    }
    if (wrongAttempts >= 3 && currentTargetId) {
      colorWorld(currentTargetId, "#ff0000");
      const realCorrectId = (currentTargetId === VIRTUAL_WEST_ID) ? JOINED_MA_ID : currentTargetId;
      const correctEl = worldSvg.querySelector(`[data-cid="${realCorrectId}"]`);
      if (correctEl) {
        correctEl.classList.remove("country-pending");
        correctEl.classList.add("country-correct");
      }
      questionsAnswered++;
      updateScore();
      remainingIds = remainingIds.filter(x => x !== currentTargetId);
      updateRemainingList();
      chooseNextTarget();
    }
  }
}

function handleClickUsa(id, ev) {
  const stateName = USA_STATES[id] || id;
  showClickLabel(stateName, ev.clientX, ev.clientY);
  if (!gameActive) return;
  if (currentMode === "USStates") {
    if (!currentTargetId) return;
    if (id === currentTargetId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;
      else add = 0;

      handleCorrect(add, id, true);
      remainingIds = remainingIds.filter(x => x !== id);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }
      if (wrongAttempts >= 3 && currentTargetId) {
        colorUsa(currentTargetId, "#ff0000");
        const correctEl = usaSvg.querySelector(`[data-usid="${currentTargetId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
        questionsAnswered++;
        updateScore();
        remainingIds = remainingIds.filter(x => x !== currentTargetId);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  } else if (currentMode === "USCapitals") {
    if (!currentTargetCapital) return;
    const correctStateId = USA_CAPITALS[currentTargetCapital];
    if (id === correctStateId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;
      else add = 0;

      handleCorrect(add, id, true);
      remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }
      if (wrongAttempts >= 3 && currentTargetCapital) {
        const correctId = USA_CAPITALS[currentTargetCapital];
        colorUsa(correctId, "#ff0000");
        const correctEl = usaSvg.querySelector(`[data-usid="${correctId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
        questionsAnswered++;
        updateScore();
        remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  }
}

function startGame() {
  endScreen.style.display = "none";
  if (clickLabel) clickLabel.style.display = "none";

  modeLabel.textContent = currentMode;
  correctScore = 0;
  questionsAnswered = 0;
  wrongAttempts = 0;
  gameActive = true;

  if (currentMode === "USStates" || currentMode === "USCapitals") {
    worldSvg.style.display = "none";
    usaSvg.style.display = "block";
  } else {
    worldSvg.style.display = "block";
    usaSvg.style.display = "none";
  }

  if (currentMode === "USStates") {
    remainingIds = [...usaIds];
    remainingCapitals = [];
    resetStylesUsa(remainingIds);
    zoomToIds(usaSvg, remainingIds);
  } else if (currentMode === "USCapitals") {
    remainingIds = [];
    remainingCapitals = Object.keys(USA_CAPITALS);
    resetStylesUsa(Object.values(USA_CAPITALS));
    zoomToIds(usaSvg, Object.values(USA_CAPITALS));
  } else {
    const regionKey = currentMode === "World" ? "World" : currentMode;
    const base = REGIONS[regionKey];
    const active = base ? base.map(x => x.toLowerCase()) : [...worldIds];
    remainingIds = active;
    remainingCapitals = [];
    resetStylesWorld(active.filter(id => id !== VIRTUAL_WEST_ID)); // only real ids for styling
    zoomToIds(worldSvg, active);
  }

  updateScore();
  updateRemainingList();
  chooseNextTarget();
}

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentMode = btn.dataset.mode;
    startGame();
  });
});

startBtn.addEventListener("click", () => {
  startGame();
});

skipBtn.addEventListener("click", () => {
  if (!gameActive) return;
  if (currentMode === "USCapitals") {
    if (!currentTargetCapital) return;
    const cap = currentTargetCapital;
    remainingCapitals = remainingCapitals.filter(c => c !== cap);
    remainingCapitals.push(cap);
    updateRemainingList();
    chooseNextTarget();
  } else {
    if (!currentTargetId) return;
    const id = currentTargetId;
    remainingIds = remainingIds.filter(x => x !== id);
    remainingIds.push(id);
    updateRemainingList();
    chooseNextTarget();
  }
});

saveScoreBtn.addEventListener("click", () => {
  if (questionsAnswered === 0) return;
  const percent = Math.round((correctScore / questionsAnswered) * 100);
  const key = "best_" + currentMode;
  const oldBest = getCookie(key);
  if (oldBest === null || percent > oldBest) {
    setCookie(key, percent);
  }
  loadBestScores();
});

closeEndBtn.addEventListener("click", () => {
  endScreen.style.display = "none";
});

window.addEventListener("load", () => {
  initWorldMap();
  initUsaMap();
  updateScore();
  updateRemainingList();
  zoomToIds(worldSvg, worldIds);
  loadBestScores();
});
</script>

</body>
</html>
