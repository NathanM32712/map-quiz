<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Map Quiz</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    color: #e5e7eb;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 10px 16px;
    background: #1e293b;
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  #question {
    font-weight: 600;
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  select, button {
    background: #334155;
    color: #e5e7eb;
    border: 1px solid #475569;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  select:hover, button:hover {
    background: #475569;
  }
  #map-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  object {
    width: 95%;
    height: 95%;
    border: 1px solid #334155;
    background: #020617;
  }
  .hover {
    stroke: #facc15 !important;
    stroke-width: 2 !important;
    cursor: pointer;
  }
  .correct {
    fill: #22c55e !important;
  }
  .wrong {
    fill: #ef4444 !important;
  }
</style>
</head>
<body>

<header>
  <div id="question">Loading…</div>

  <div id="controls">
    <span>Continent:</span>
    <select id="continent">
      <option value="world">World</option>
      <option value="africa">Africa</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
      <option value="northamerica">North America</option>
      <option value="southamerica">South America</option>
      <option value="oceania">Oceania</option>
    </select>

    <span id="score">Score: 0%</span>
    <span id="chances">Chances left: 3</span>

    <button id="reset">Reset zoom</button>
    <button id="skip">Skip</button>
    <button id="restart">Restart</button>
  </div>
</header>

<div id="map-container">
  <object id="svgMap" data="world.svg" type="image/svg+xml"></object>
</div>

<script>
// === COUNTRY NAMES ===
const COUNTRY_NAMES = {
 "AF":"Afghanistan","AL":"Albania","DZ":"Algeria","AI":"Anguilla","AM":"Armenia",
 "AW":"Aruba","AT":"Austria","BH":"Bahrain","BD":"Bangladesh","BB":"Barbados",
 "BY":"Belarus","BE":"Belgium","BZ":"Belize","BJ":"Benin","BM":"Bermuda",
 "BT":"Bhutan","BO":"Bolivia","BA":"Bosnia and Herzegovina","BW":"Botswana",
 "BR":"Brazil","VG":"British Virgin Islands","BN":"Brunei Darussalam","BG":"Bulgaria",
 "BF":"Burkina Faso","BI":"Burundi","KH":"Cambodia","CM":"Cameroon",
 "CF":"Central African Republic","TD":"Chad","CO":"Colombia","CR":"Costa Rica",
 "HR":"Croatia","CU":"Cuba","CW":"Curaçao","CZ":"Czech Republic",
 "CI":"Côte d'Ivoire","KP":"Dem. Rep. Korea","CD":"Democratic Republic of the Congo",
 "DJ":"Djibouti","DM":"Dominica","DO":"Dominican Republic","EC":"Ecuador",
 "EG":"Egypt","SV":"El Salvador","GQ":"Equatorial Guinea","ER":"Eritrea",
 "EE":"Estonia","ET":"Ethiopia","FI":"Finland","GF":"French Guiana","GA":"Gabon",
 "GE":"Georgia","DE":"Germany","GH":"Ghana","GL":"Greenland","GD":"Grenada",
 "GU":"Guam","GT":"Guatemala","GN":"Guinea","GW":"Guinea-Bissau","GY":"Guyana",
 "HT":"Haiti","HN":"Honduras","HU":"Hungary","IS":"Iceland","IN":"India",
 "IR":"Iran","IQ":"Iraq","IE":"Ireland","IL":"Israel","JM":"Jamaica",
 "JO":"Jordan","KZ":"Kazakhstan","KE":"Kenya","XK":"Kosovo","KW":"Kuwait",
 "KG":"Kyrgyzstan","LA":"Lao PDR","LV":"Latvia","LB":"Lebanon","LS":"Lesotho",
 "LR":"Liberia","LY":"Libya","LT":"Lithuania","LU":"Luxembourg","MK":"Macedonia",
 "MG":"Madagascar","MW":"Malawi","MV":"Maldives","ML":"Mali","MH":"Marshall Islands",
 "MQ":"Martinique","MR":"Mauritania","YT":"Mayotte","MX":"Mexico","MD":"Moldova",
 "MN":"Mongolia","ME":"Montenegro","MS":"Montserrat","MA":"Morocco","MZ":"Mozambique",
 "MM":"Myanmar","NA":"Namibia","NR":"Nauru","NP":"Nepal","NL":"Netherlands",
 "NI":"Nicaragua","NE":"Niger","NG":"Nigeria","PK":"Pakistan","PW":"Palau",
 "PS":"Palestine","PA":"Panama","PY":"Paraguay","PE":"Peru","PL":"Poland",
 "PT":"Portugal","QA":"Qatar","CG":"Republic of Congo","KR":"Republic of Korea",
 "RO":"Romania","RW":"Rwanda","LC":"Saint Lucia","VC":"Saint Vincent and the Grenadines",
 "SA":"Saudi Arabia","SN":"Senegal","RS":"Serbia","SL":"Sierra Leone",
 "SK":"Slovakia","SI":"Slovenia","SO":"Somalia","ZA":"South Africa",
 "ES":"Spain","LK":"Sri Lanka","SD":"Sudan","SR":"Suriname","SE":"Sweden",
 "CH":"Switzerland","SY":"Syria","TW":"Taiwan","TJ":"Tajikistan","TZ":"Tanzania",
 "TH":"Thailand","GM":"The Gambia","TL":"Timor-Leste","TG":"Togo","TN":"Tunisia",
 "TM":"Turkmenistan","TV":"Tuvalu","UG":"Uganda","UA":"Ukraine","AE":"United Arab Emirates",
 "UY":"Uruguay","UZ":"Uzbekistan","VE":"Venezuela","VN":"Vietnam","YE":"Yemen",
 "ZM":"Zambia","ZW":"Zimbabwe"
};

// === CONTINENT LISTS ===
const CONTINENTS = {
  africa: ["DZ","BJ","BW","BF","BI","CM","CF","TD","CD","DJ","EG","GQ","ER","ET","GA","GH","GN","GW","CI","KE","LS","LR","LY","MG","MW","ML","MR","YT","MA","MZ","NA","NE","NG","RE","RW","SN","SL","SO","ZA","SS","SD","SZ","TZ","TG","TN","UG","EH","ZM","ZW"],
  asia: ["AF","AM","BH","BD","BT","KH","GE","IN","IR","IQ","IL","JO","KZ","KW","KG","LA","LB","MV","MN","MM","NP","KP","PK","PS","QA","SA","KR","LK","SY","TW","TJ","TH","TL","TM","AE","UZ","VN","YE"],
  europe: ["AL","AT","BY","BE","BA","BG","HR","CZ","EE","FI","FR","GE","DE","GR","HU","IS","IE","IT","XK","LV","LT","LU","MK","MD","ME","NL","NO","PL","PT","RO","RS","SK","SI","ES","SE","CH","UA"],
  northamerica: ["AI","BB","BZ","CA","CR","CU","DM","DO","SV","GD","GT","HT","HN","JM","MX","NI","PA","LC","VC"],
  southamerica: ["BO","BR","CL","CO","EC","GF","GY","PY","PE","SR","UY","VE"],
  oceania: ["GU","MH","NR","PW","TV"]
};

let svg = null;
let viewBoxOriginal = null;

let pool = [];
let target = null;

let correct = 0;
let total = 0;
let chancesLeft = 3;

const questionEl = document.getElementById("question");
const scoreEl = document.getElementById("score");
const chancesEl = document.getElementById("chances");
const continentSelect = document.getElementById("continent");

document.getElementById("svgMap").addEventListener("load", () => {
  svg = document.getElementById("svgMap").contentDocument.documentElement;

  viewBoxOriginal = svg.getAttribute("viewBox").split(" ").map(Number);

  // === FIXED CLICK + HOVER DETECTION ===
  for (const code in COUNTRY_NAMES) {
    const el = svg.getElementById(code);
    if (!el) continue;

    // Make entire country clickable + hoverable
    el.querySelectorAll("*").forEach(child => {
      child.dataset.country = code;

      child.addEventListener("mouseenter", () => el.classList.add("hover"));
      child.addEventListener("mouseleave", () => el.classList.remove("hover"));

      child.addEventListener("click", (e) => {
        const clickedCode = e.target.dataset.country;
        handleClick(clickedCode, el);
      });
    });

    el.dataset.country = code;

    el.addEventListener("mouseenter", () => el.classList.add("hover"));
    el.addEventListener("mouseleave", () => el.classList.remove("hover"));

    el.addEventListener("click", () => handleClick(code, el));
  }

  startMode("world");
});

function startMode(continent) {
  correct = 0;
  total = 0;
  chancesLeft = 3;
  updateScore();
  updateChances();

  if (continent === "world") {
    pool = Object.keys(COUNTRY_NAMES);
    resetZoom();
  } else {
    pool = CONTINENTS[continent];
    zoomToContinent(pool);
  }

  nextQuestion();
}

function nextQuestion() {
  chancesLeft = 3;
  updateChances();

  target = pool[Math.floor(Math.random() * pool.length)];
  questionEl.textContent = "Find: " + COUNTRY_NAMES[target];
}

function handleClick(code, el) {
  zoomTo(el);

  if (code === target) {
    correct++;
    total++;
    el.classList.add("correct");
    setTimeout(() => el.classList.remove("correct"), 800);
    updateScore();
    nextQuestion();
  } else {
    chancesLeft--;
    el.classList.add("wrong");
    setTimeout(() => el.classList.remove("wrong"), 800);

    if (chancesLeft <= 0) {
      total++;
      updateScore();
      nextQuestion();
    } else {
      updateChances();
      questionEl.textContent =
        `Find: ${COUNTRY_NAMES[target]} (Chances left: ${chancesLeft})`;
    }
  }
}

function updateScore() {
  const percent = total === 0 ? 0 : Math.round((correct / total) * 100);
  scoreEl.textContent = `Score: ${percent}%`;
}

function updateChances() {
  chancesEl.textContent = `Chances left: ${chancesLeft}`;
}

function zoomTo(el) {
  const b = el.getBBox();
  const pad = 10;
  svg.setAttribute("viewBox",
    `${b.x - pad} ${b.y - pad} ${b.width + pad*2} ${b.height + pad*2}`);
}

function zoomToContinent(codes) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  codes.forEach(code => {
    const el = svg.getElementById(code);
    if (!el) return;
    const b = el.getBBox();
    minX = Math.min(minX, b.x);
    minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.width);
    maxY = Math.max(maxY, b.y + b.height);
  });

  const pad = 20;
  svg.setAttribute("viewBox",
    `${minX - pad} ${minY - pad} ${(maxX-minX)+pad*2} ${(maxY-minY)+pad*2}`);
}

function resetZoom() {
  svg.setAttribute("viewBox", viewBoxOriginal.join(" "));
}

continentSelect.addEventListener("change", e => {
  startMode(e.target.value);
});

document.getElementById("reset").onclick = resetZoom;

document.getElementById("skip").onclick = () => {
  total++;
  chancesLeft = 3;
  updateScore();
  updateChances();
  nextQuestion();
};

document.getElementById("restart").onclick = () => {
  startMode(continentSelect.value);
};
</script>

</body>
</html>
