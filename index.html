<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>World Map Quiz</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 0.5rem 1rem;
    background: #181818;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    border-bottom: 1px solid #333;
  }

  select, button {
    background: #222;
    color: #eee;
    border: 1px solid #444;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.9rem;
  }

  button {
    cursor: pointer;
  }

  #status {
    margin-left: auto;
    font-size: 0.9rem;
    opacity: 0.9;
  }

  #target {
    font-weight: 600;
    color: #ffd166;
  }

  main {
    flex: 1;
    display: flex;
    background: #000;
    overflow: hidden;
  }

  #map-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
  }

  svg {
    max-width: 100%;
    max-height: 100%;
    background: #4aa3ff; /* BLUE OCEAN */
    transition: viewBox 0.25s ease-out;
  }

  svg path {
    fill: #4caf50; /* GREEN COUNTRIES */
    stroke: #2d6a2d;
    stroke-width: 0.5;
    cursor: pointer;
    transition: fill 0.15s, stroke 0.15s, opacity 0.15s;
  }

  svg path.country-disabled {
    display: none !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }

  svg path.country-pending:hover {
    fill: #5ecf63;
  }

  svg path.country-correct {
    fill: #2d6a4f !important;
    stroke: #95d5b2 !important;
    opacity: 1 !important;
  }

  svg path.country-wrong {
    fill: #b30000 !important;
    stroke: #ffcc00 !important;
    opacity: 1 !important;
  }

  #sidebar {
    width: 260px;
    max-width: 40vw;
    border-left: 1px solid #333;
    background: #141414;
    padding: 0.75rem;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    font-size: 0.9rem;
  }

  #score {
    font-weight: 600;
  }

  #remaining-list {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #333;
    padding: 0.5rem;
    border-radius: 4px;
    background: #101010;
  }

  #remaining-list h3 {
    margin: 0 0 0.25rem;
    font-size: 0.9rem;
    border-bottom: 1px solid #333;
    padding-bottom: 0.25rem;
  }

  #remaining-list ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
    columns: 2;
    column-gap: 0.75rem;
    font-size: 0.8rem;
  }

  #remaining-list li {
    break-inside: avoid;
    margin-bottom: 0.15rem;
  }

  .done {
    text-decoration: line-through;
    opacity: 0.4;
  }
</style>
</head>

<body>

<header>
  <label>
    Region:
    <select id="region-select">
      <option value="World">World</option>
      <option value="Africa">Africa</option>
      <option value="Europe">Europe</option>
      <option value="Asia">Asia</option>
      <option value="NorthAmerica">North America</option>
      <option value="CentralAmerica">Central America</option>
      <option value="SouthAmerica">South America</option>
      <option value="Oceania">Oceania</option>
      <option value="MiddleEast">Middle East</option>
    </select>
  </label>

  <button id="start-btn">Start / Reset</button>

  <span id="status">
    Target: <span id="target">—</span>
  </span>
</header>

<main>
  <div id="map-container">
    <svg id="world-svg" viewBox="0 0 2000 1000"></svg>
  </div>

  <aside id="sidebar">
    <div id="score">Score: 0 / 0</div>
    <div>Mode: <span id="mode-label">World</span></div>

    <div id="remaining-list">
      <h3>Remaining</h3>
      <ul id="remaining-ul"></ul>
    </div>
  </aside>
</main>

/* -----------------------------
   LOAD world.txt
------------------------------ */
async function loadWorldSVG() {
  try {
    const response = await fetch("world.txt");
    const text = await response.text();
    document.getElementById("world-svg").innerHTML = text;

  } catch (err) {

/* -----------------------------
   GAME LOGIC
------------------------------ */
const svg = document.getElementById("world-svg");
const regionSelect = document.getElementById("region-select");
const startBtn = document.getElementById("start-btn");
const targetSpan = document.getElementById("target");
const scoreSpan = document.getElementById("score");
const modeLabel = document.getElementById("mode-label");
const remainingUl = document.getElementById("remaining-ul");

let allClickableIds = [];
let activeRegionIds = [];
let remainingIds = [];
let currentTargetId = null;
let correctCount = 0;
let totalCount = 0;
let gameActive = false;

function initMap() {
  const paths = svg.querySelectorAll("path[id]");
  allClickableIds = [];

  paths.forEach(p => {
    const id = p.id.trim().toUpperCase();
    p.dataset.cid = id;

    if (COUNTRY_NAMES[id]) {
      allClickableIds.push(id);
      p.addEventListener("click", () => handleCountryClick(id));
    } else {
      p.style.display = "none";
    }
  });

  REGIONS.World = [...allClickableIds];
}

function pickRegionIds(regionKey) {
  const base = REGIONS[regionKey];
  if (!base) return [...REGIONS.World];
  const set = new Set(base.map(x => x.toUpperCase()));
  return REGIONS.World.filter(id => set.has(id));
}

function resetStyles() {
  const paths = svg.querySelectorAll("path[id]");
  paths.forEach(p => {
    const id = p.dataset.cid;

    p.classList.remove("country-correct","country-wrong","country-disabled","country-pending");

    if (COUNTRY_NAMES[id] && activeRegionIds.includes(id)) {
      p.style.display = "inline";
      p.style.opacity = "1";
      p.style.pointerEvents = "auto";
      p.classList.add("country-pending");
    } else {
      p.style.display = "none";
    }
  });
}

function updateScore() {
  scoreSpan.textContent = `Score: ${correctCount} / ${totalCount}`;
}

function updateRemainingList() {
  remainingUl.innerHTML = "";
  const sorted = [...activeRegionIds].sort((a,b) =>
    (COUNTRY_NAMES[a] || a).localeCompare(COUNTRY_NAMES[b] || b)
  );

  sorted.forEach(id => {
    const li = document.createElement("li");
    li.textContent = COUNTRY_NAMES[id] || id;
    if (!remainingIds.includes(id)) li.classList.add("done");
    remainingUl.appendChild(li);
  });
}

function chooseNextTarget() {
  if (remainingIds.length === 0) {
    currentTargetId = null;
    targetSpan.textContent = "Done!";
    gameActive = false;
    return;
  }
  const idx = Math.floor(Math.random() * remainingIds.length);
  currentTargetId = remainingIds[idx];
  targetSpan.textContent = COUNTRY_NAMES[currentTargetId];
}

function handleCountryClick(id) {
  if (!gameActive || !currentTargetId) return;
  if (!activeRegionIds.includes(id)) return;

  const path = svg.querySelector(`path[data-cid="${id}"]`);
  if (!path) return;

  if (id === currentTargetId) {
    path
