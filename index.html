<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>World Map Quiz</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 10px 16px;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #quiz-info {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 14px;
    }

    #question {
      font-weight: 600;
    }

    #score {
      font-weight: 600;
    }

    #controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 4px 10px;
      font-size: 13px;
      border-radius: 4px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #e5e7eb;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    #message {
      font-size: 13px;
      min-width: 160px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
    }

    #map-container {
      width: 90vw;
      height: 80vh;
      max-width: 1200px;
      border: 1px solid #4b5563;
      background: #020617;
    }

    #map-container object {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Highlight hovered country */
    .country-hover {
      stroke: #facc15 !important;
      stroke-width: 1.5 !important;
      cursor: pointer;
    }

    /* Correct / wrong flash */
    .correct {
      fill: #22c55e !important;
    }

    .wrong {
      fill: #ef4444 !important;
    }
  </style>
</head>
<body>
  <header>
    <div id="quiz-info">
      <div id="question">Loading map…</div>
      <div id="score">Score: 0 / 0</div>
    </div>
    <div id="controls">
      <button id="resetZoomBtn">Reset zoom</button>
      <button id="restartBtn">Restart quiz</button>
      <div id="message"></div>
    </div>
  </header>

  <main>
    <div id="map-container">
      <!-- Make sure world.svg is in the same folder as this HTML file -->
      <object id="worldMap" type="image/svg+xml" data="world.svg"></object>
    </div>
  </main>

  <script>
    const worldObject = document.getElementById('worldMap');
    const questionEl = document.getElementById('question');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');
    const resetZoomBtn = document.getElementById('resetZoomBtn');
    const restartBtn = document.getElementById('restartBtn');

    let svgRoot = null;
    let originalViewBox = null;

    // Quiz state
    let countries = [];      // { id, name, element }
    let remaining = [];      // queue of country objects
    let current = null;      // current target country
    let correctCount = 0;
    let totalQuestions = 10; // number of questions per round
    let answered = 0;

    worldObject.addEventListener('load', () => {
      svgRoot = worldObject.contentDocument.documentElement;

      // Save original viewBox for reset
      const vb = svgRoot.getAttribute('viewBox');
      if (vb) {
        originalViewBox = vb.split(' ').map(Number);
      } else {
        // Fallback: create a viewBox from width/height
        const w = parseFloat(svgRoot.getAttribute('width')) || 1000;
        const h = parseFloat(svgRoot.getAttribute('height')) || 500;
        originalViewBox = [0, 0, w, h];
        svgRoot.setAttribute('viewBox', originalViewBox.join(' '));
      }

      // Collect country paths
      // Assumes each country is a <path> (or <g>) with id or data-name
      const all = svgRoot.querySelectorAll('path, g');
      countries = [];
      all.forEach(el => {
        const id = el.id || el.getAttribute('data-id');
        const name = el.getAttribute('data-name') || id;
        if (!id || !name) return;
        countries.push({ id, name, element: el });
      });

      if (countries.length === 0) {
        questionEl.textContent = 'No countries found in SVG. Add ids/data-name to paths.';
        return;
      }

      attachCountryEvents();
      startQuiz();
    });

    function attachCountryEvents() {
      countries.forEach(c => {
        const el = c.element;

        el.style.transition = 'fill 0.2s, stroke 0.2s';

        el.addEventListener('mouseenter', () => {
          el.classList.add('country-hover');
        });

        el.addEventListener('mouseleave', () => {
          el.classList.remove('country-hover');
        });

        el.addEventListener('click', () => {
          handleCountryClick(c);
        });
      });
    }

    function startQuiz() {
      correctCount = 0;
      answered = 0;
      messageEl.textContent = '';
      resetZoom();

      // Pick a random subset of countries for the quiz
      const shuffled = [...countries].sort(() => Math.random() - 0.5);
      remaining = shuffled.slice(0, Math.min(totalQuestions, shuffled.length));

      nextQuestion();
      updateScore();
    }

    function nextQuestion() {
      if (remaining.length === 0) {
        endQuiz();
        return;
      }
      current = remaining.shift();
      questionEl.textContent = `Click on: ${current.name}`;
    }

    function handleCountryClick(clicked) {
      if (!current) return;

      // Zoom into clicked country
      zoomToElement(clicked.element);

      // Check correctness
      answered++;
      if (clicked.id === current.id) {
        correctCount++;
        flashCountry(clicked.element, 'correct');
        messageEl.textContent = 'Correct!';
      } else {
        flashCountry(clicked.element, 'wrong');
        messageEl.textContent = `Wrong, that was ${clicked.name}.`;
      }

      updateScore();

      // Next question after short delay
      setTimeout(() => {
        if (remaining.length > 0) {
          nextQuestion();
        } else {
          endQuiz();
        }
      }, 900);
    }

    function flashCountry(el, cls) {
      el.classList.add(cls);
      setTimeout(() => el.classList.remove(cls), 700);
    }

    function updateScore() {
      scoreEl.textContent = `Score: ${correctCount} / ${answered}`;
    }

    function endQuiz() {
      current = null;
      const percent = answered === 0 ? 0 : Math.round((correctCount / answered) * 100);
      questionEl.textContent = `Quiz finished. Final score: ${percent} / 100`;
      messageEl.textContent = 'Click "Restart quiz" to play again.';
      resetZoom();
    }

    function resetZoom() {
      if (!svgRoot || !originalViewBox) return;
      svgRoot.setAttribute('viewBox', originalViewBox.join(' '));
    }

    function zoomToElement(el) {
      if (!svgRoot) return;
      const bbox = el.getBBox();
      const padding = 10;

      const x = bbox.x - padding;
      const y = bbox.y - padding;
      const w = bbox.width + padding * 2;
      const h = bbox.height + padding * 2;

      svgRoot.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
    }

    resetZoomBtn.addEventListener('click', resetZoom);
    restartBtn.addEventListener('click', startQuiz);
  </script>
</body>
</html>
