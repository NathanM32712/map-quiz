<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geography Quiz Platform</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #111827;
    color: #e5e7eb;
    overflow-x: hidden;
  }

  /* Launch Deck icon */
  .launch-icon {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    display: block;
    background-image: url("../icon.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    z-index: 9999;
  }

  .app-container {
    display: flex;
    flex-direction: row;
    gap: 16px;
    padding: 60px 16px 16px 16px;
    box-sizing: border-box;
  }

  .left-panel {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .left-panel h2 {
    margin: 0 0 8px 0;
    font-size: 1rem;
    color: #9ca3af;
  }

  .mode-btn {
    width: 100%;
    padding: 8px 10px;
    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    text-align: left;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .mode-btn:hover {
    background: #111827;
  }

  .best-score {
    font-size: 0.8rem;
    color: #9ca3af;
  }

  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #target-display {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .map-container {
    width: 100%;
    max-width: 900px;
    height: auto;
    border: 1px solid #374151;
    background: #020617;
  }

  .right-panel {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .controls button {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .controls button:hover {
    background: #111827;
  }

  #remaining-container {
    flex: 1;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 6px;
    overflow-y: auto;
    background: #020617;
  }

  #remaining-container h3 {
    margin: 0 0 4px 0;
    font-size: 0.9rem;
    color: #9ca3af;
  }

  #remaining-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 0.85rem;
  }

  #remaining-ul li {
    padding: 2px 0;
  }

  #remaining-ul li.done {
    text-decoration: line-through;
    color: #6b7280;
  }

  #mode-label, #score {
    font-size: 0.9rem;
  }

  #mode-label span {
    font-weight: 600;
  }

  /* Country/State states */
  .country-pending {
    cursor: pointer;
  }

  .country-correct {
    cursor: default;
  }

  .country-wrong {
    animation: flashWrong 0.5s;
  }

  @keyframes flashWrong {
    0% { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  /* Click label */
  #click-label {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: #facc15;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 99999;
    display: none;
    transform: translate(-50%, -120%);
    white-space: nowrap;
  }

  /* End screen */
  #end-screen {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
  }

  #end-box {
    background: #020617;
    border: 1px solid #374151;
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
    max-width: 320px;
  }

  #end-text {
    white-space: pre-line;
    margin-bottom: 12px;
    font-size: 1rem;
  }

  #save-score-btn, #close-end-btn {
    padding: 8px 12px;
    margin: 4px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  #save-score-btn:hover, #close-end-btn:hover {
    background: #111827;
  }
</style>
</head>
<body>

<a class="launch-icon" href="https://nathanm32712.github.io/Launch-deck/launch-deck.html"></a>

<div id="click-label"></div>

<div id="end-screen">
  <div id="end-box">
    <div id="end-text"></div>
    <button id="save-score-btn">Save Score</button>
    <button id="close-end-btn">Close</button>
  </div>
</div>

<div class="app-container">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h2>Quizzes</h2>

    <button class="mode-btn" data-mode="Africa"><span>Africa</span><span class="best-score" id="best-Africa"></span></button>
    <button class="mode-btn" data-mode="Asia"><span>Asia</span><span class="best-score" id="best-Asia"></span></button>
    <button class="mode-btn" data-mode="Europe"><span>Europe</span><span class="best-score" id="best-Europe"></span></button>
    <button class="mode-btn" data-mode="MiddleEast"><span>Middle East</span><span class="best-score" id="best-MiddleEast"></span></button>
    <button class="mode-btn" data-mode="NorthAmerica"><span>North America</span><span class="best-score" id="best-NorthAmerica"></span></button>
    <button class="mode-btn" data-mode="Oceania"><span>Oceania</span><span class="best-score" id="best-Oceania"></span></button>
    <button class="mode-btn" data-mode="SouthAmerica"><span>South America</span><span class="best-score" id="best-SouthAmerica"></span></button>

    <button class="mode-btn" data-mode="USStates"><span>US States</span><span class="best-score" id="best-USStates"></span></button>
    <button class="mode-btn" data-mode="USCapitals"><span>US Capitals</span><span class="best-score" id="best-USCapitals"></span></button>

    <button class="mode-btn" data-mode="World"><span>World Map</span><span class="best-score" id="best-World"></span></button>
  </div>

  <!-- CENTER PANEL -->
  <div class="center-panel">
    <div id="target-display">Find: <span id="target">—</span></div>

    <div class="map-container">
      <!-- WORLD SVG -->
      <svg id="world-svg" viewBox="0 0 2000 1000" style="display:block;">
        <!-- WORLD SVG GOES HERE -->
      </svg>

      <!-- USA SVG -->
      <svg id="usa-svg" viewBox="0 0 1000 600" style="display:none;">
        <!-- USA SVG GOES HERE -->
      </svg>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="controls">
      <button id="start-btn">Start / Reset</button>
      <button id="skip-btn">Skip</button>
    </div>

    <div id="remaining-container">
      <h3>Remaining</h3>
      <ul id="remaining-ul"></ul>
    </div>

    <div id="mode-label">Mode: <span>None</span></div>
    <div id="score">Score: 0.00 / 0 (0%)</div>
  </div>

</div>
