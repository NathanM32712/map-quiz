<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Quiz</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #111827;
    color: #e5e7eb;
    cursor: crosshair;
    overflow-x: hidden;
  }

  .launch-icon {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    background-image: url("icon.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    z-index: 9999;
  }

  #admin-arrow {
    position: fixed;
    width: 20px;
    height: 20px;
    pointer-events: none;
    z-index: 99999;
    display: none;
    transform: translate(-50%, -50%);
    font-size: 20px;
    color: white;
    text-shadow: 0 0 4px black;
  }

  .app-container {
    display: flex;
    flex-direction: row;
    gap: 16px;
    padding: 60px 16px 16px 16px;
    box-sizing: border-box;
  }

  .left-panel {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .left-panel h2 {
    margin: 0 0 8px 0;
    font-size: 1rem;
    color: #9ca3af;
  }

  .mode-btn {
    width: 100%;
    padding: 8px 10px;
    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    text-align: left;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .mode-btn:hover {
    background: #111827;
  }

  .mode-btn.active {
    background: #0f172a;
    border-color: #22c55e;
  }

  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #target-display {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .map-container {
    width: 100%;
    max-width: 900px;
    border: 1px solid #374151;
    background: #020617;
    position: relative;
    margin-bottom: 20px;
  }

  .right-panel {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls button {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .controls button:hover {
    background: #111827;
  }

  #mode-select {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
    margin-left: 6px;
  }

  #mode-select:hover {
    background: #111827;
  }

  #remaining-container {
    flex: 1;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 6px;
    overflow-y: auto;
    background: #020617;
  }

  #remaining-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 0.85rem;
  }

  #click-label {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: #facc15;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 99999;
    display: none;
    transform: translate(-50%, -120%);
    white-space: nowrap;
  }

  #end-screen {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
  }

  #end-box {
    background: #020617;
    border: 1px solid #374151;
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
    max-width: 320px;
  }

  #end-box button {
    margin-top: 10px;
    margin-inline: 4px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.85rem;
  }

  #end-box button:hover {
    background: #111827;
  }

  .country-correct {
    stroke: #22c55e;
    stroke-width: 1.5;
  }

  .country-wrong {
    stroke: #ef4444;
    stroke-width: 2;
  }

  .country-pending {
    stroke: #0ea5e9;
    stroke-width: 0.8;
  }
</style>
</head>
<body>

<a class="launch-icon" href="Launch-Deck"></a>

<div id="admin-arrow">➤</div>
<div id="click-label"></div>

<div id="end-screen">
  <div id="end-box">
    <div id="end-text"></div>
    <button id="save-score-btn">Save Score</button>
    <button id="close-end-btn">Close</button>
  </div>
</div>

<div class="app-container">

  <div class="left-panel">
    <h2>Regions</h2>
    <button class="mode-btn" data-region="World">World</button>
    <button class="mode-btn" data-region="Africa">Africa</button>
    <button class="mode-btn" data-region="Asia">Asia</button>
    <button class="mode-btn" data-region="Europe">Europe</button>
    <button class="mode-btn" data-region="MiddleEast">Middle East</button>
    <button class="mode-btn" data-region="NorthAmerica">North America</button>
    <button class="mode-btn" data-region="SouthAmerica">South America</button>
    <button class="mode-btn" data-region="Oceania">Oceania</button>
    <button class="mode-btn" data-region="USStates">US States</button>
    <button class="mode-btn" data-region="USCapitals">US Capitals</button>
  </div>

  <div class="center-panel">
    <div id="target-display">Find: <span id="target">—</span></div>

    <div id="world-container" class="map-container">
      <!-- world.txt will load here -->
    </div>

    <div id="usa-container" class="map-container" style="display:none;">
      <!-- us.txt will load here -->
    </div>
  </div>

  <div class="right-panel">
    <div class="controls">
      <button id="start-btn">Start</button>
      <button id="skip-btn">Skip</button>

      <select id="mode-select">
        <option value="Practice">Practice</option>
        <option value="Speedrun">Speedrun</option>
        <option value="Hard">Hard</option>
      </select>

      <div id="mode-label">Mode: <span>Practice</span></div>
      <div id="score">Score: 0.00 / 0 (0%)</div>
    </div>

    <div id="remaining-container">
      <h3>Remaining</h3>
      <ul id="remaining-ul"></ul>
    </div>
  </div>

</div>

   LOAD SVG PATHS FROM world.txt AND us.txt
   ============================================================ */

let worldSvg = null;
let usaSvg = null;

function loadMaps() {
  fetch("world.txt")
    .then(r => r.text())
    .then(paths => {
      document.getElementById("world-container").innerHTML =
        `<svg id="world-svg" viewBox="0 0 1000 600">${paths}</svg>`;
      worldSvg = document.getElementById("world-svg");
      initWorldMap();
    });

  fetch("us.txt")
    .then(r => r.text())
    .then(paths => {
      document.getElementById("usa-container").innerHTML =
        `<svg id="usa-svg" viewBox="0 0 1000 600">${paths}</svg>`;
      usaSvg = document.getElementById("usa-svg");
      initUsaMap();
    });
}

/* ============================================================
   ADMIN CHECK
   ============================================================ */

function isAdmin() {
  return document.cookie.split(";").some(c => c.trim().startsWith("admin=true"));
}

/* ============================================================
   COOKIES
   ============================================================ */

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? parseFloat(match[2]) : null;
}

function setCookie(name, value) {
  document.cookie = `${name}=${value};path=/;max-age=31536000`;
}

/* ============================================================
   MAP INIT
   ============================================================ */

function initWorldMap() {
  if (!worldSvg) return;
  const elements = worldSvg.querySelectorAll("path[id]");
  worldIds = [];

  elements.forEach(el => {
    const id = el.id.trim().toLowerCase();
    el.dataset.cid = id;

    if (COUNTRY_NAMES[id]) {
      worldIds.push(id);
      el.addEventListener("click", ev => handleClickWorld(id, ev));
      el.style.fill = "#4caf50";
    } else {
      el.style.display = "none";
    }
  });

  REGIONS.World = [...worldIds];
}

function initUsaMap() {
  if (!usaSvg) return;
  const elements = usaSvg.querySelectorAll("path[id]");
  usaIds = [];

  elements.forEach(el => {
    const id = el.id.trim().toUpperCase();
    el.dataset.usid = id;

    if (USA_STATES[id]) {
      usaIds.push(id);
      el.addEventListener("click", ev => handleClickUsa(id, ev));
      el.style.fill = "#4caf50";
    } else {
      el.style.display = "none";
    }
  });
}

/* ============================================================
   STYLE RESET
   ============================================================ */

function resetStylesWorld(activeIds) {
  if (!worldSvg) return;
  const elements = worldSvg.querySelectorAll("[data-cid]");
  elements.forEach(el => {
    const id = el.dataset.cid;
    el.classList.remove("country-correct","country-wrong","country-pending");

    if (COUNTRY_NAMES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      el.style.fill = "#4caf50";
    } else {
      el.style.display = "none";
    }
  });
}

function resetStylesUsa(activeIds) {
  if (!usaSvg) return;
  const elements = usaSvg.querySelectorAll("[data-usid]");
  elements.forEach(el => {
    const id = el.dataset.usid;
    el.classList.remove("country-correct","country-wrong","country-pending");

    if (USA_STATES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      el.style.fill = "#4caf50";
    } else {
      el.style.display = "none";
    }
  });
}

/* ============================================================
   COLOR HELPERS
   ============================================================ */

function colorWorld(id, color) {
  if (!worldSvg) return;
  const el = worldSvg.querySelector(`[data-cid="${id}"]`);
  if (el) el.style.fill = color;
}

function colorUsa(id, color) {
  if (!usaSvg) return;
  const el = usaSvg.querySelector(`[data-usid="${id}"]`);
  if (el) el.style.fill = color;
}

/* ============================================================
   SCORE + REMAINING
   ============================================================ */

function updateScore() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  scoreSpan.textContent = `Score: ${correctScore.toFixed(2)} / ${questionsAnswered} (${percent.toFixed(0)}%)`;
}

function updateRemainingList() {
  remainingUl.innerHTML = "";

  if (currentRegion === "USCapitals") {
    const sortedCaps = [...remainingCapitals].sort((a,b) => a.localeCompare(b));
    sortedCaps.forEach(cap => {
      const li = document.createElement("li");
      li.textContent = cap;
      remainingUl.appendChild(li);
    });
    return;
  }

  let namesMap = currentRegion === "USStates" ? USA_STATES : COUNTRY_NAMES;
  const sorted = [...remainingIds].sort((a,b) =>
    (namesMap[a] || a).localeCompare(namesMap[b] || b)
  );

  sorted.forEach(id => {
    const li = document.createElement("li");
    li.textContent = namesMap[id] || id;
    remainingUl.appendChild(li);
  });
}

/* ============================================================
   END SCREEN
   ============================================================ */

function showEndScreen() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  endText.textContent = `FINAL SCORE\n${percent.toFixed(2)}%\n(${correctScore.toFixed(2)} / ${questionsAnswered})`;
  endScreen.style.display = "flex";
}

/* ============================================================
   CLICK LABEL
   ============================================================ */

function showClickLabel(name, x, y, durationMs) {
  if (currentMode === "Hard") return;

  clickLabel.textContent = name;
  clickLabel.style.left = x + "px";
  clickLabel.style.top  = y + "px";
  clickLabel.style.display = "block";

  const dur = durationMs || 1000;
  clearTimeout(clickLabel.hideTimer);
  clickLabel.hideTimer = setTimeout(() => {
    clickLabel.style.display = "none";
  }, dur);
}

   ZOOM
   ============================================================ */

function zoomToIds(svg, ids) {
  if (!svg || !ids || ids.length === 0) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  ids.forEach(id => {
    const selector = (svg === worldSvg) ? `[data-cid="${id}"]` : `[data-usid="${id}"]`;
    const el = svg.querySelector(selector);
    if (!el) return;
    const b = el.getBBox();
    minX = Math.min(minX, b.x);
    minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.width);
    maxY = Math.max(maxY, b.y + b.height);
  });

  const pad = 20;
  minX -= pad;
  minY -= pad;
  maxX += pad;
  maxY += pad;

  const width  = maxX - minX;
  const height = maxY - minY;

  svg.setAttribute("viewBox", `${minX} ${minY} ${width} ${height}`);
}

/* ============================================================
   CORRECT HANDLING
   ============================================================ */

function handleCorrect(add, id, isUsa) {
  correctScore += add;
  questionsAnswered++;

  if (isUsa) {
    colorUsa(id, "#00cc00");
    const el = usaSvg.querySelector(`[data-usid="${id}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  } else {
    colorWorld(id, "#00cc00");
    const el = worldSvg.querySelector(`[data-cid="${id}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  }

  updateScore();
}

/* ============================================================
   CLICK HANDLERS
   ============================================================ */

function handleClickWorld(id, ev) {
  const name = COUNTRY_NAMES[id] || id;

  if (currentMode === "Speedrun") {
    showClickLabel(name, ev.clientX, ev.clientY, 10000);
  } else if (currentMode === "Practice") {
    showClickLabel(name, ev.clientX, ev.clientY, 1500);
  } else {
    showClickLabel(name, ev.clientX, ev.clientY, 1000);
  }

  if (!gameActive) return;
  if (!currentTargetId) return;

  const isHard = currentMode === "Hard";

  if (id === currentTargetId) {
    let add = 0;
    if (wrongAttempts === 0) add = 1;
    else if (wrongAttempts === 1) add = 2/3;
    else if (wrongAttempts === 2) add = 1/3;

    handleCorrect(add, id, false);
    remainingIds = remainingIds.filter(x => x !== id);
    updateRemainingList();
    chooseNextTarget();
  } else {
    wrongAttempts++;
    const el = worldSvg.querySelector(`[data-cid="${id}"]`);
    if (el) {
      el.classList.add("country-wrong");
      setTimeout(() => el.classList.remove("country-wrong"), 500);
    }

    if (isHard || wrongAttempts >= 3) {
      if (currentTargetId) {
        colorWorld(currentTargetId, "#ff0000");
        const correctEl = worldSvg.querySelector(`[data-cid="${currentTargetId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
      }
      questionsAnswered++;
      updateScore();
      remainingIds = remainingIds.filter(x => x !== currentTargetId);
      updateRemainingList();
      chooseNextTarget();
    }
  }
}

function handleClickUsa(id, ev) {
  const stateName = USA_STATES[id] || id;

  if (currentMode === "Speedrun") {
    showClickLabel(stateName, ev.clientX, ev.clientY, 10000);
  } else if (currentMode === "Practice") {
    showClickLabel(stateName, ev.clientX, ev.clientY, 1500);
  } else {
    showClickLabel(stateName, ev.clientX, ev.clientY, 1000);
  }

  if (!gameActive) return;

  const isHard = currentMode === "Hard";

  if (currentRegion !== "USCapitals") {
    if (!currentTargetId) return;

    if (id === currentTargetId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;

      handleCorrect(add, id, true);
      remainingIds = remainingIds.filter(x => x !== id);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }

      if (isHard || wrongAttempts >= 3) {
        if (currentTargetId) {
          colorUsa(currentTargetId, "#ff0000");
          const correctEl = usaSvg.querySelector(`[data-usid="${currentTargetId}"]`);
          if (correctEl) {
            correctEl.classList.remove("country-pending");
            correctEl.classList.add("country-correct");
          }
        }
        questionsAnswered++;
        updateScore();
        remainingIds = remainingIds.filter(x => x !== currentTargetId);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  } else {
    if (!currentTargetCapital) return;

    const correctStateId = USA_CAPITALS[currentTargetCapital];

    if (id === correctStateId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;

      handleCorrect(add, id, true);
      remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }

      if (isHard || wrongAttempts >= 3) {
        const correctId = USA_CAPITALS[currentTargetCapital];
        colorUsa(correctId, "#ff0000");
        const correctEl = usaSvg.querySelector(`[data-usid="${correctId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
        questionsAnswered++;
        updateScore();
        remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  }
}

/* ============================================================
   TIMER LOGIC
   ============================================================ */

function stopTimer() {
  if (timerId) {
    clearInterval(timerId);
    timerId = null;
  }
}

function setupModeTimerForNewQuestion() {
  stopTimer();

  if (!gameActive) return;

  if (currentMode === "Speedrun") {
    const base = 15;
    const penalty = Math.min(speedrunPenalty, 3);
    timeLeft = Math.max(3, base - penalty);

    timerId = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        if (currentRegion === "USCapitals") {
          if (currentTargetCapital) {
            const correctId = USA_CAPITALS[currentTargetCapital];
            colorUsa(correctId, "#ff0000");
            questionsAnswered++;
            updateScore();
            remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
          }
        } else if (currentRegion === "USStates") {
          if (currentTargetId) {
            colorUsa(currentTargetId, "#ff0000");
            questionsAnswered++;
            updateScore();
            remainingIds = remainingIds.filter(x => x !== currentTargetId);
          }
        } else {
          if (currentTargetId) {
            colorWorld(currentTargetId, "#ff0000");
            questionsAnswered++;
            updateScore();
            remainingIds = remainingIds.filter(x => x !== currentTargetId);
          }
        }
        updateRemainingList();
        chooseNextTarget();
      }
    }, 1000);
  } else if (currentMode === "Hard") {
    // Hard uses global timer only
  }
}

function startHardGlobalTimer() {
  stopTimer();
  hardGlobalTime = 30;

  timerId = setInterval(() => {
    hardGlobalTime--;
    if (hardGlobalTime <= 0) {
      gameActive = false;
      stopTimer();
      showEndScreen();
    }
  }, 1000);
}

/* ============================================================
   TARGET SELECTION
   ============================================================ */

function chooseNextTarget() {
  if (currentRegion === "USCapitals") {
    if (remainingCapitals.length === 0) {
      currentTargetCapital = null;
      targetSpan.textContent = "Done!";
      gameActive = false;
      stopTimer();
      showEndScreen();
      return;
    }
    const idx = Math.floor(Math.random() * remainingCapitals.length);
    currentTargetCapital = remainingCapitals[idx];
    targetSpan.textContent = currentTargetCapital;
    wrongAttempts = 0;
    setupModeTimerForNewQuestion();
    return;
  }

  if (remainingIds.length === 0) {
    currentTargetId = null;
    targetSpan.textContent = "Done!";
    gameActive = false;
    stopTimer();
    showEndScreen();
    return;
  }

  const idx = Math.floor(Math.random() * remainingIds.length);
  currentTargetId = remainingIds[idx];

  if (currentRegion === "USStates") {
    targetSpan.textContent = USA_STATES[currentTargetId];
  } else {
    targetSpan.textContent = COUNTRY_NAMES[currentTargetId];
  }

  wrongAttempts = 0;
  setupModeTimerForNewQuestion();
}

/* ============================================================
   START GAME
   ============================================================ */

function startGame() {
  endScreen.style.display = "none";
  clickLabel.style.display = "none";

  modeLabel.textContent = currentMode;
  correctScore = 0;
  questionsAnswered = 0;
  wrongAttempts = 0;
  speedrunPenalty = 0;
  gameActive = true;

  stopTimer();

  if (currentRegion === "USStates" || currentRegion === "USCapitals") {
    worldContainer.style.display = "none";
    usaContainer.style.display   = "block";
  } else {
    worldContainer.style.display = "block";
    usaContainer.style.display   = "none";
  }

  if (currentRegion === "USStates") {
    remainingIds = [...usaIds];
    remainingCapitals = [];
    resetStylesUsa(remainingIds);
    zoomToIds(usaSvg, remainingIds);
  } else if (currentRegion === "USCapitals") {
    remainingIds = [];
    remainingCapitals = Object.keys(USA_CAPITALS);
    resetStylesUsa(Object.values(USA_CAPITALS));
    zoomToIds(usaSvg, Object.values(USA_CAPITALS));
  } else {
    const regionKey = currentRegion === "World" ? "World" : currentRegion;
    const base = REGIONS[regionKey];
    const active = base ? base.map(x => x.toLowerCase()) : [...worldIds];
    remainingIds = active;
    remainingCapitals = [];
    resetStylesWorld(active);
    zoomToIds(worldSvg, active);
  }

  if (currentMode === "Hard") {
    startHardGlobalTimer();
  }

  updateScore();
  updateRemainingList();
  chooseNextTarget();
  updateAdminArrowVisibility();
}

/* ============================================================
   SKIP
   ============================================================ */

skipBtn.addEventListener("click", () => {
  if (!gameActive) return;

  if (currentMode === "Speedrun") {
    speedrunPenalty = Math.min(speedrunPenalty + 1, 3);
  }

  if (currentRegion === "USCapitals") {
    if (!currentTargetCapital) return;
    const cap = currentTargetCapital;
    remainingCapitals = remainingCapitals.filter(c => c !== cap);
    remainingCapitals.push(cap);
    updateRemainingList();
    chooseNextTarget();
  } else {
    if (!currentTargetId) return;
    const id = currentTargetId;
    remainingIds = remainingIds.filter(x => x !== id);
    remainingIds.push(id);
    updateRemainingList();
    chooseNextTarget();
  }
});

/* ============================================================
   SAVE SCORE
   ============================================================ */

saveScoreBtn.addEventListener("click", () => {
  if (questionsAnswered === 0) return;
  const percent = Math.round((correctScore / questionsAnswered) * 100);
  const key = "best_" + currentMode + "_" + currentRegion;
  const oldBest = getCookie(key);
  if (oldBest === null || percent > oldBest) {
    setCookie(key, percent);
  }
});

/* ============================================================
   CLOSE END SCREEN
   ============================================================ */

closeEndBtn.addEventListener("click", () => {
  endScreen.style.display = "none";
});

/* ============================================================
   MODE SELECT
   ============================================================ */

modeSelect.addEventListener("change", e => {
  currentMode = e.target.value;
  startGame();
});

/* ============================================================
   REGION BUTTONS
   ============================================================ */

regionButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    regionButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentRegion = btn.dataset.region;
    startGame();
  });
});

/* ============================================================
   ADMIN ARROW
   ============================================================ */

function updateAdminArrowVisibility() {
  adminArrow.style.display = isAdmin() ? "block" : "none";
}

window.addEventListener("mousemove", e => {
  if (adminArrow.style.display === "none") return;
  const x = e.clientX;
  const y = e.clientY;
  adminArrow.style.left = x + "px";
  adminArrow.style.top  = y + "px";

  const dx = x - window.innerWidth / 2;
  const dy = y - window.innerHeight / 2;
  const angle = Math.atan2(dy, dx) * (180 / Math.PI);
  adminArrow.style.transform =
    `translate(-50%, -50%) rotate(${angle}deg)`;
});

/* ============================================================
   START BUTTON
   ============================================================ */

startBtn.addEventListener("click", () => {
  startGame();
});

/* ============================================================
   ON LOAD
   ============================================================ */

window.addEventListener("load", () => {
  loadMaps();
  updateScore();
  updateRemainingList();
  currentMode = "Practice";
  modeSelect.value = "Practice";
  modeLabel.textContent = currentMode;
  regionButtons.forEach(btn => {
    if (btn.dataset.region === "World") btn.classList.add("active");
  });
  updateAdminArrowVisibility();
});
</script>
