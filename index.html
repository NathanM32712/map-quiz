<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Map Quiz</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }
    #sidebar {
      width: 280px;
      background: #222;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
    }
    #map {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #svgMap {
      width: 100%;
      height: 100%;
      border: none;
    }
    select, button {
      padding: 6px 8px;
      background: #333;
      border: 1px solid #555;
      color: #eee;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
    }
    button:hover {
      background: #444;
    }
    .highlight {
      stroke: #ffd54a !important;
      stroke-width: 2 !important;
    }
    #target {
      font-weight: bold;
      color: #ffd54a;
    }
    #score {
      font-weight: bold;
    }
    #result.correct {
      color: #7CFC00;
    }
    #result.wrong {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>World Map Quiz</h2>

  <label for="modeSelect">Mode:</label>
  <select id="modeSelect">
    <option value="World">World (all countries)</option>
    <option value="North America">North America</option>
    <option value="South America">South America</option>
    <option value="Europe">Europe</option>
    <option value="Africa">Africa</option>
    <option value="Asia">Asia</option>
    <option value="Oceania">Oceania</option>
  </select>

  <button id="nextBtn">Next Country</button>

  <div>
    <strong>Find:</strong> <span id="target">---</span>
  </div>

  <div>
    <strong>Score:</strong> <span id="score">0</span> / <span id="total">0</span>
  </div>

  <div id="result"></div>
</div>

<div id="map">
  <object id="svgMap" data="world.svg" type="image/svg+xml"></object>
</div>

<script>
// ------------------------------
// COUNTRY LIST BY CONTINENT
// ------------------------------
const continents = {
  "North America": [
    "United States","Canada","Mexico","Guatemala","Belize","El Salvador","Honduras",
    "Nicaragua","Costa Rica","Panama","Cuba","Jamaica","Haiti","Dominican Republic",
    "The Bahamas","Barbados","Trinidad and Tobago","Saint Lucia",
    "Saint Vincent and the Grenadines","Grenada","Antigua and Barbuda",
    "Dominica","Saint Kitts and Nevis"
  ],
  "South America": [
    // 12 to keep world total at 196 (no French Guiana)
    "Brazil","Argentina","Chile","Uruguay","Paraguay","Bolivia","Peru","Ecuador",
    "Colombia","Venezuela","Guyana","Suriname"
  ],
  "Europe": [
    "United Kingdom","Ireland","France","Spain","Portugal","Germany","Italy",
    "Switzerland","Austria","Belgium","Netherlands","Luxembourg","Denmark","Norway",
    "Sweden","Finland","Iceland","Poland","Czech Republic","Slovakia","Hungary",
    "Romania","Bulgaria","Greece","Croatia","Slovenia","Bosnia and Herzegovina",
    "Serbia","Montenegro","Kosovo","Albania","North Macedonia","Estonia","Latvia",
    "Lithuania","Belarus","Ukraine","Moldova"
  ],
  "Africa": [
    "Algeria","Tunisia","Libya","Egypt","Morocco","Western Sahara","Mauritania","Mali",
    "Niger","Chad","Sudan","South Sudan","Eritrea","Djibouti","Ethiopia","Somalia",
    "Senegal","Gambia","Guinea-Bissau","Guinea","Sierra Leone","Liberia",
    "Ivory Coast","Ghana","Togo","Benin","Nigeria","Cameroon",
    "Central African Republic","Equatorial Guinea","Gabon","Republic of the Congo",
    "Democratic Republic of the Congo","Uganda","Rwanda","Burundi","Kenya","Tanzania",
    "Angola","Zambia","Malawi","Mozambique","Zimbabwe","Botswana","Namibia",
    "South Africa","Lesotho","Eswatini","Madagascar","Seychelles","Comoros",
    "Mauritius","Cape Verde"
  ],
  "Asia": [
    "Russia","Turkey","Georgia","Armenia","Azerbaijan","Kazakhstan","Uzbekistan",
    "Turkmenistan","Kyrgyzstan","Tajikistan","China","Mongolia","Japan","North Korea",
    "South Korea","Taiwan","India","Pakistan","Bangladesh","Nepal","Bhutan",
    "Sri Lanka","Maldives","Myanmar","Thailand","Laos","Cambodia","Vietnam","Malaysia",
    "Singapore","Indonesia","Philippines","Brunei","East Timor","Saudi Arabia","Yemen",
    "Oman","United Arab Emirates","Qatar","Bahrain","Kuwait","Iraq","Iran","Syria",
    "Jordan","Israel","Lebanon","Afghanistan"
  ],
  "Oceania": [
    "Australia","New Zealand","Papua New Guinea","Fiji","Solomon Islands","Vanuatu",
    "Samoa","Tonga","Kiribati","Tuvalu","Nauru","Palau","Micronesia","Marshall Islands"
  ]
};

// ------------------------------
// STATE
// ------------------------------
let svgDoc = null;
let svgRoot = null;
let initialViewBox = null;

let currentMode = "World";
let modeCountries = [];
let remainingCountries = [];
let currentCountry = null;
let correctCount = 0;
let modeTotal = 0;

const modeSelect = document.getElementById("modeSelect");
const nextBtn = document.getElementById("nextBtn");
const targetEl = document.getElementById("target");
const scoreEl = document.getElementById("score");
const totalEl = document.getElementById("total");
const resultEl = document.getElementById("result");

// ------------------------------
// HELPERS
// ------------------------------
function getModeCountries(mode) {
  if (mode === "World") {
    const set = new Set();
    Object.values(continents).forEach(arr => arr.forEach(c => set.add(c)));
    return Array.from(set);
  }
  return continents[mode] ? [...continents[mode]] : [];
}

function resetScoreAndPool() {
  modeCountries = getModeCountries(currentMode);
  remainingCountries = [...modeCountries];
  correctCount = 0;
  modeTotal = modeCountries.length;
  scoreEl.textContent = correctCount;
  totalEl.textContent = modeTotal;
  resultEl.textContent = "";
  resultEl.className = "";
}

function pickNextCountry() {
  if (!remainingCountries.length) {
    targetEl.textContent = "---";
    resultEl.textContent = `You completed ${currentMode}! ${correctCount}/${modeTotal} correct.`;
    resultEl.className = "correct";
    return;
  }
  const idx = Math.floor(Math.random() * remainingCountries.length);
  currentCountry = remainingCountries[idx];
  targetEl.textContent = currentCountry;
  resultEl.textContent = "";
  resultEl.className = "";
  clearHighlights();
  zoomToCountry(currentCountry);
}

function clearHighlights() {
  if (!svgDoc) return;
  svgDoc.querySelectorAll("path").forEach(p => p.classList.remove("highlight"));
}

function findCountryElement(name) {
  if (!svgDoc) return null;
  const paths = svgDoc.querySelectorAll("path");
  const targetLower = name.toLowerCase();
  for (const p of paths) {
    const cls = (p.getAttribute("class") || "").trim();
    const id = (p.getAttribute("id") || "").trim();
    if (cls && cls.toLowerCase() === targetLower) return p;
    if (id && id.toLowerCase() === targetLower) return p;
  }
  return null;
}

// Smooth viewBox animation
function animateViewBox(from, to, duration = 500) {
  if (!svgRoot) return;
  const start = performance.now();

  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const w = from.w + (to.w - from.w) * t;
    const h = from.h + (to.h - from.h) * t;
    svgRoot.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function parseViewBox(vb) {
  if (!vb) return null;
  const parts = vb.split(/\s+/).map(Number);
  if (parts.length !== 4 || parts.some(isNaN)) return null;
  return { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
}

function zoomToCountry(name) {
  if (!svgRoot || !svgDoc) return;
  const el = findCountryElement(name);
  if (!el) return;

  const bbox = el.getBBox();
  const paddingFactor = 1.5;
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;
  const w = bbox.width * paddingFactor;
  const h = bbox.height * paddingFactor;
  const x = cx - w / 2;
  const y = cy - h / 2;

  const currentVB = parseViewBox(svgRoot.getAttribute("viewBox")) || initialViewBox;
  const targetVB = { x, y, w, h };
  animateViewBox(currentVB, targetVB, 500);
}

// ------------------------------
// CLICK HANDLING
// ------------------------------
function setupClicks() {
  if (!svgDoc) return;
  const paths = svgDoc.querySelectorAll("path");
  paths.forEach(p => {
    p.style.cursor = "pointer";
    p.addEventListener("click", () => {
      if (!currentCountry) return;
      const cls = (p.getAttribute("class") || "").trim();
      const id = (p.getAttribute("id") || "").trim();
      const name = cls || id;
      if (!name) return;

      if (name.toLowerCase() === currentCountry.toLowerCase()) {
        // Correct
        p.classList.add("highlight");
        resultEl.textContent = "Correct!";
        resultEl.className = "correct";

        // Remove from remaining
        remainingCountries = remainingCountries.filter(c => c !== currentCountry);
        correctCount++;
        scoreEl.textContent = correctCount;

        // Next after a short delay
        setTimeout(pickNextCountry, 700);
      } else {
        resultEl.textContent = `Wrong! That was ${name}.`;
        resultEl.className = "wrong";
      }
    });
  });
}

// ------------------------------
// MODE CHANGE
// ------------------------------
modeSelect.addEventListener("change", () => {
  currentMode = modeSelect.value;
  resetScoreAndPool();
  // Reset viewBox to full world
  if (svgRoot && initialViewBox) {
    svgRoot.setAttribute("viewBox",
      `${initialViewBox.x} ${initialViewBox.y} ${initialViewBox.w} ${initialViewBox.h}`);
  }
  pickNextCountry();
});

// ------------------------------
// INIT
// ------------------------------
document.getElementById("svgMap").addEventListener("load", () => {
  svgDoc = document.getElementById("svgMap").contentDocument;
  svgRoot = svgDoc.documentElement;

  const vb = parseViewBox(svgRoot.getAttribute("viewBox"));
  if (vb) {
    initialViewBox = vb;
  } else {
    const bbox = svgRoot.getBBox();
    initialViewBox = { x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height };
    svgRoot.setAttribute("viewBox",
      `${initialViewBox.x} ${initialViewBox.y} ${initialViewBox.w} ${initialViewBox.h}`);
  }

  setupClicks();
  resetScoreAndPool();
  pickNextCountry();
});

nextBtn.addEventListener("click", () => {
  pickNextCountry();
});
</script>

</body>
</html>
