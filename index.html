<!DOCTYPE html>

    color: white;
    text-shadow: 0 0 4px black;

    flex-direction: row;
    gap: 16px;
    padding: 60px 16px 16px 16px;

    font-size: 1rem;

  }

    width: 100%;

    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    text-align: left;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .mode-btn:hover {
    background: #111827;
  }

  .best-score {
    font-size: 0.8rem;
    color: #9ca3af;
  }

  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #target-display {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .map-container {
    width: 100%;
    max-width: 900px;
    border: 1px solid #374151;
    background: #020617;
    position: relative;
    margin-bottom: 20px;
  }

  .right-panel {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls button {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .controls button:hover {
    background: #111827;
  }

  #mode-select {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #e5e7eb;
    cursor: pointer;
    font-size: 0.9rem;
    margin-left: 6px;
  }

  #mode-select:hover {
    background: #111827;
  }

  #remaining-container {
    flex: 1;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 6px;
    overflow-y: auto;
    background: #020617;
  }

  #remaining-ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 0.85rem;
  }

  #remaining-ul li.done {
    text-decoration: line-through;
    color: #6b7280;
  }

  #click-label {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: #facc15;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 99999;
    display: none;
    transform: translate(-50%, -120%);

  }

  #end-screen {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
  }

  #end-box {
    background: #020617;
    border: 1px solid #374151;
    border-radius: 10px;
    padding: 20px 24px;
    text-align: center;
    max-width: 320px;

/* ===========================
   COOKIES
   =========================== */

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? parseFloat(match[2]) : null;
}

function setCookie(name, value) {
  document.cookie = `${name}=${value};path=/;max-age=31536000`;
}

function loadBestScores() {
  const modes = [
    "Africa","Asia","Europe","MiddleEast","NorthAmerica",
    "Oceania","SouthAmerica","USStates","USCapitals","World",
    "Practice","Speedrun","Hard"
  ];
  modes.forEach(m => {
    const best = getCookie("best_" + m);
    const span = document.getElementById("best-" + m);
    if (span) span.textContent = best != null ? `Best: ${best}%` : "";
  });
}

/* ===========================
   MAP INIT
   =========================== */

function initWorldMap() {
  if (!worldSvg) return;
  const elements = worldSvg.querySelectorAll("path[id], g[id]");
  worldIds = [];
  elements.forEach(el => {
    const id = el.id.trim().toLowerCase();
    el.dataset.cid = id;
    if (COUNTRY_NAMES[id]) {
      worldIds.push(id);
      el.addEventListener("click", ev => handleClickWorld(id, ev));
    } else {
      el.style.display = "none";
    }
  });
  REGIONS.World = [...worldIds];
}

function initUsaMap() {
  if (!usaSvg) return;
  const elements = usaSvg.querySelectorAll("path[id], g[id]");
  usaIds = [];
  elements.forEach(el => {
    const id = el.id.trim().toUpperCase();
    el.dataset.usid = id;
    if (USA_STATES[id]) {
      usaIds.push(id);
      el.addEventListener("click", ev => handleClickUsa(id, ev));
    } else {
      el.style.display = "none";
    }
  });
}

/* ===========================
   STYLE RESET
   =========================== */

function resetStylesWorld(activeIds) {
  if (!worldSvg) return;
  const elements = worldSvg.querySelectorAll("[data-cid]");
  elements.forEach(el => {
    const id = el.dataset.cid;
    el.classList.remove("country-correct","country-wrong","country-pending");
    if (COUNTRY_NAMES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      if (el.tagName.toLowerCase() === "g") {
        el.querySelectorAll("path").forEach(p => p.style.fill = "#4caf50");
      } else {
        el.style.fill = "#4caf50";
      }
    } else {
      el.style.display = "none";
    }
  });
}

function resetStylesUsa(activeIds) {
  if (!usaSvg) return;
  const elements = usaSvg.querySelectorAll("[data-usid]");
  elements.forEach(el => {
    const id = el.dataset.usid;
    el.classList.remove("country-correct","country-wrong","country-pending");
    if (USA_STATES[id] && activeIds.includes(id)) {
      el.style.display = "inline";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.classList.add("country-pending");
      if (el.tagName.toLowerCase() === "g") {

      }
    } else {
      el.style.display = "none";
    }
  });
}

/* ===========================
   SCORE + REMAINING
   =========================== */

function updateScore() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  scoreSpan.textContent = `Score: ${correctScore.toFixed(2)} / ${questionsAnswered} (${percent.toFixed(0)}%)`;
}

function updateRemainingList() {
  remainingUl.innerHTML = "";

  if (currentMode === "USCapitals") {
    const sortedCaps = [...remainingCapitals].sort((a,b) => a.localeCompare(b));
    sortedCaps.forEach(cap => {
      const li = document.createElement("li");
      li.textContent = cap;
      remainingUl.appendChild(li);
    });
    return;
  }

  let namesMap = currentMode === "USStates" ? USA_STATES : COUNTRY_NAMES;
  const sorted = [...remainingIds].sort((a,b) =>
    (namesMap[a] || a).localeCompare(namesMap[b] || b)
  );

  sorted.forEach(id => {
    const li = document.createElement("li");
    li.textContent = namesMap[id] || id;
    remainingUl.appendChild(li);
  });
}

/* ===========================
   END SCREEN
   =========================== */

function showEndScreen() {
  const percent = questionsAnswered === 0 ? 0 : (correctScore / questionsAnswered) * 100;
  endText.textContent = `FINAL SCORE\n${percent.toFixed(2)}%\n(${correctScore.toFixed(2)} / ${questionsAnswered})`;
  endScreen.style.display = "flex";
}

/* ===========================
   COLOR HELPERS
   =========================== */

function colorWorld(id, color) {
  if (!worldSvg) return;
  const el = worldSvg.querySelector(`[data-cid="${id}"]`);
  if (!el) return;
  if (el.tagName.toLowerCase() === "g") {
    el.querySelectorAll("path").forEach(p => p.style.fill = color);
  } else {
    el.style.fill = color;
  }
}

function colorUsa(id, color) {
  if (!usaSvg) return;
  const el = usaSvg.querySelector(`[data-usid="${id}"]`);
  if (!el) return;
  if (el.tagName.toLowerCase() === "g") {
    el.querySelectorAll("path").forEach(p => p.style.fill = color);
  } else {
    el.style.fill = color;
  }
}

/* ===========================
   CLICK LABEL
   =========================== */

function showClickLabel(name, x, y, durationMs) {
  if (currentMode === "Hard") return; // no labels in hard mode

  clickLabel.textContent = name;
  clickLabel.style.left = x + "px";
  clickLabel.style.top  = y + "px";
  clickLabel.style.display = "block";

  const dur = durationMs || 1000;
  clearTimeout(clickLabel.hideTimer);
  clickLabel.hideTimer = setTimeout(() => {
    clickLabel.style.display = "none";
  }, dur);
}

/* ===========================
   TARGET SELECTION
   =========================== */

function chooseNextTarget() {
  if (currentMode === "USCapitals") {
    if (remainingCapitals.length === 0) {
      currentTargetCapital = null;
      targetSpan.textContent = "Done!";
      gameActive = false;
      stopTimer();
      showEndScreen();
      return;
    }
    const idx = Math.floor(Math.random() * remainingCapitals.length);
    currentTargetCapital = remainingCapitals[idx];
    targetSpan.textContent = currentTargetCapital;
    wrongAttempts = 0;
    setupModeTimerForNewQuestion();
    return;
  }

  if (remainingIds.length === 0) {
    currentTargetId = null;
    targetSpan.textContent = "Done!";
    gameActive = false;
    stopTimer();
    showEndScreen();
    return;
  }

  const idx = Math.floor(Math.random() * remainingIds.length);
  currentTargetId = remainingIds[idx];

  if (currentMode === "USStates") {
    targetSpan.textContent = USA_STATES[currentTargetId];
  } else {
    targetSpan.textContent = COUNTRY_NAMES[currentTargetId];
  }

  wrongAttempts = 0;
  setupModeTimerForNewQuestion();
}

/* ===========================
   ZOOM
   =========================== */

function zoomToIds(svg, ids) {
  if (!svg || !ids || ids.length === 0) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  ids.forEach(id => {
    const selector = (svg === worldSvg) ? `[data-cid="${id}"]` : `[data-usid="${id}"]`;
    const el = svg.querySelector(selector);
    if (!el) return;
    const b = el.getBBox();
    minX = Math.min(minX, b.x);
    minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.width);
    maxY = Math.max(maxY, b.y + b.height);
  });

  const pad = 20;
  minX -= pad;
  minY -= pad;
  maxX += pad;
  maxY += pad;

  const vb = `${minX} ${minY} ${maxX - minX} ${maxY - minY}`;
  svg.setAttribute("viewBox", vb);
}

/* ===========================
   CORRECT HANDLING
   =========================== */

function handleCorrect(add, id, isUsa) {
  correctScore += add;
  questionsAnswered++;

  if (isUsa) {
    colorUsa(id, "#00cc00");
    const el = usaSvg.querySelector(`[data-usid="${id}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  } else {
    colorWorld(id, "#00cc00");
    const el = worldSvg.querySelector(`[data-cid="${id}"]`);
    if (el) {
      el.classList.remove("country-pending");
      el.classList.add("country-correct");
    }
  }

  updateScore();
}

/* ===========================
   CLICK HANDLERS
   =========================== */

function handleClickWorld(id, ev) {
  const name = COUNTRY_NAMES[id] || id;

  if (currentMode === "Speedrun") {
    showClickLabel(name, ev.clientX, ev.clientY, 10000);
  } else if (currentMode === "Practice") {
    showClickLabel(name, ev.clientX, ev.clientY, 1500);
  } else {
    showClickLabel(name, ev.clientX, ev.clientY, 1000);
  }

  if (!gameActive) return;
  if (!currentTargetId) return;

  const isHard = currentMode === "Hard";

  if (id === currentTargetId) {
    let add = 0;
    if (wrongAttempts === 0) add = 1;
    else if (wrongAttempts === 1) add = 2/3;
    else if (wrongAttempts === 2) add = 1/3;

    handleCorrect(add, id, false);
    remainingIds = remainingIds.filter(x => x !== id);
    updateRemainingList();
    chooseNextTarget();
  } else {
    wrongAttempts++;
    const el = worldSvg.querySelector(`[data-cid="${id}"]`);
    if (el) {
      el.classList.add("country-wrong");
      setTimeout(() => el.classList.remove("country-wrong"), 500);
    }

    if (isHard || wrongAttempts >= 3) {
      if (currentTargetId) {
        colorWorld(currentTargetId, "#ff0000");
        const correctEl = worldSvg.querySelector(`[data-cid="${currentTargetId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
      }
      questionsAnswered++;
      updateScore();
      remainingIds = remainingIds.filter(x => x !== currentTargetId);
      updateRemainingList();
      chooseNextTarget();
    }
  }
}

function handleClickUsa(id, ev) {
  const stateName = USA_STATES[id] || id;

  if (currentMode === "Speedrun") {
    showClickLabel(stateName, ev.clientX, ev.clientY, 10000);
  } else if (currentMode === "Practice") {
    showClickLabel(stateName, ev.clientX, ev.clientY, 1500);
  } else {
    showClickLabel(stateName, ev.clientX, ev.clientY, 1000);
  }

  if (!gameActive) return;

  const isHard = currentMode === "Hard";

  if (currentMode === "USStates" || currentMode === "Practice" || currentMode === "Speedrun" || currentMode === "Hard") {
    if (!currentTargetId) return;

    if (id === currentTargetId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;

      handleCorrect(add, id, true);
      remainingIds = remainingIds.filter(x => x !== id);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }

      if (isHard || wrongAttempts >= 3) {
        if (currentTargetId) {
          colorUsa(currentTargetId, "#ff0000");
          const correctEl = usaSvg.querySelector(`[data-usid="${currentTargetId}"]`);
          if (correctEl) {
            correctEl.classList.remove("country-pending");
            correctEl.classList.add("country-correct");
          }
        }
        questionsAnswered++;
        updateScore();
        remainingIds = remainingIds.filter(x => x !== currentTargetId);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  }

  else if (currentMode === "USCapitals") {
    if (!currentTargetCapital) return;

    const correctStateId = USA_CAPITALS[currentTargetCapital];

    if (id === correctStateId) {
      let add = 0;
      if (wrongAttempts === 0) add = 1;
      else if (wrongAttempts === 1) add = 2/3;
      else if (wrongAttempts === 2) add = 1/3;

      handleCorrect(add, id, true);
      remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
      updateRemainingList();
      chooseNextTarget();
    } else {
      wrongAttempts++;
      const el = usaSvg.querySelector(`[data-usid="${id}"]`);
      if (el) {
        el.classList.add("country-wrong");
        setTimeout(() => el.classList.remove("country-wrong"), 500);
      }

      if (isHard || wrongAttempts >= 3) {
        const correctId = USA_CAPITALS[currentTargetCapital];
        colorUsa(correctId, "#ff0000");
        const correctEl = usaSvg.querySelector(`[data-usid="${correctId}"]`);
        if (correctEl) {
          correctEl.classList.remove("country-pending");
          correctEl.classList.add("country-correct");
        }
        questionsAnswered++;
        updateScore();
        remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
        updateRemainingList();
        chooseNextTarget();
      }
    }
  }
}

/* ===========================
   TIMER LOGIC
   =========================== */

function stopTimer() {
  if (timerId) {
    clearInterval(timerId);
    timerId = null;
  }
}

function setupModeTimerForNewQuestion() {
  stopTimer();

  if (!gameActive) return;

  if (currentMode === "Speedrun") {
    const base = 15;
    const penalty = Math.min(speedrunPenalty, 3);
    timeLeft = Math.max(3, base - penalty);
    timerId = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        // time up for this question
        if (currentMode === "USCapitals") {
          if (currentTargetCapital) {
            const correctId = USA_CAPITALS[currentTargetCapital];
            colorUsa(correctId, "#ff0000");
            const correctEl = usaSvg.querySelector(`[data-usid="${correctId}"]`);
            if (correctEl) {
              correctEl.classList.remove("country-pending");
              correctEl.classList.add("country-correct");
            }
            questionsAnswered++;
            updateScore();
            remainingCapitals = remainingCapitals.filter(c => c !== currentTargetCapital);
          }
        } else {
          if (currentTargetId) {
            if (currentMode === "USStates") {
              colorUsa(currentTargetId, "#ff0000");
              const correctEl = usaSvg.querySelector(`[data-usid="${currentTargetId}"]`);
              if (correctEl) {
                correctEl.classList.remove("country-pending");
                correctEl.classList.add("country-correct");
              }
            } else {
              colorWorld(currentTargetId, "#ff0000");
              const correctEl = worldSvg.querySelector(`[data-cid="${currentTargetId}"]`);
              if (correctEl) {
                correctEl.classList.remove("country-pending");
                correctEl.classList.add("country-correct");
              }
            }
            questionsAnswered++;
            updateScore();
            remainingIds = remainingIds.filter(x => x !== currentTargetId);
          }
        }
        updateRemainingList();
        chooseNextTarget();
      }
    }, 1000);
  }

  else if (currentMode === "Hard") {
    // hard uses global timer only; started at game start
  }

  else {
    // Practice / normal region modes: no timer
  }
}

function startHardGlobalTimer() {
  stopTimer();
  hardGlobalTime = 30;
  timerId = setInterval(() => {
    hardGlobalTime--;
    if (hardGlobalTime <= 0) {
      gameActive = false;
      stopTimer();
      showEndScreen();
    }
  }, 1000);
}

/* ===========================
   START GAME
   =========================== */

function startGame() {
  endScreen.style.display = "none";
  if (clickLabel) clickLabel.style.display = "none";

  modeLabel.textContent = currentMode;
  correctScore = 0;
  questionsAnswered = 0;
  wrongAttempts = 0;
  speedrunPenalty = 0;
  gameActive = true;

  stopTimer();

  // map visibility
  if (currentMode === "USStates" || currentMode === "USCapitals" || currentMode === "Practice" || currentMode === "Speedrun" || currentMode === "Hard") {
    // these can use USA or World depending on region; for now:
    if (currentMode === "USStates" || currentMode === "USCapitals") {
      worldContainer.style.display = "none";
      usaContainer.style.display   = "block";
    } else if (currentMode === "Practice" || currentMode === "Speedrun" || currentMode === "Hard") {
      // default practice/speedrun/hard on World map
      worldContainer.style.display = "block";
      usaContainer.style.display   = "none";
    }
  } else {
    // region/world modes
    worldContainer.style.display = "block";
    usaContainer.style.display   = "none";
  }

  if (currentMode === "USStates") {
    remainingIds = [...usaIds];
    remainingCapitals = [];
    resetStylesUsa(remainingIds);
    zoomToIds(usaSvg, remainingIds);
  }

  else if (currentMode === "USCapitals") {
    remainingIds = [];
    remainingCapitals = Object.keys(USA_CAPITALS);
    resetStylesUsa(Object.values(USA_CAPITALS));
    zoomToIds(usaSvg, Object.values(USA_CAPITALS));
  }

  else if (currentMode === "Practice" || currentMode === "Speedrun" || currentMode === "Hard") {
    // practice/speedrun/hard on full world
    const active = [...worldIds];
    remainingIds = active;
    remainingCapitals = [];
    resetStylesWorld(active);
    zoomToIds(worldSvg, active);

    if (currentMode === "Hard") {
      startHardGlobalTimer();
    }
  }

  else {
    const regionKey = currentMode === "World" ? "World" : currentMode;
    const base = REGIONS[regionKey];
    const active = base ? base.map(x => x.toLowerCase()) : [...worldIds];
    remainingIds = active;
    remainingCapitals = [];
    resetStylesWorld(active);
    zoomToIds(worldSvg, active);
  }

  updateScore();
  updateRemainingList();
  chooseNextTarget();
  updateAdminArrowVisibility();
}

/* ===========================
   SKIP
   =========================== */

skipBtn.addEventListener("click", () => {
  if (!gameActive) return;

  if (currentMode === "Speedrun") {
    speedrunPenalty = Math.min(speedrunPenalty + 1, 3);
  }

  if (currentMode === "USCapitals") {
    if (!currentTargetCapital) return;
    const cap = currentTargetCapital;
    remainingCapitals = remainingCapitals.filter(c => c !== cap);
    remainingCapitals.push(cap);
    updateRemainingList();
    chooseNextTarget();
  } else {
    if (!currentTargetId) return;
    const id = currentTargetId;
    remainingIds = remainingIds.filter(x => x !== id);
    remainingIds.push(id);
    updateRemainingList();
    chooseNextTarget();
  }
});

/* ===========================
   SAVE SCORE
   =========================== */

saveScoreBtn.addEventListener("click", () => {
  if (questionsAnswered === 0) return;
  const percent = Math.round((correctScore / questionsAnswered) * 100);
  const key = "best_" + currentMode;
  const oldBest = getCookie(key);
  if (oldBest === null || percent > oldBest) {
    setCookie(key, percent);
  }
  loadBestScores();
});

closeEndBtn.addEventListener("click", () => {
  endScreen.style.display = "none";
});

/* ===========================
   MODE SELECT
   =========================== */

if (modeSelect) {
  modeSelect.addEventListener("change", e => {
    currentMode = e.target.value;
    startGame();
  });
}

/* ===========================
   ADMIN ARROW
   =========================== */

function updateAdminArrowVisibility() {
  if (currentMode === "Practice") {
    adminArrow.style.display = "block";
  } else {
    adminArrow.style.display = admin ? "block" : "none";
  }
}

if (adminArrow) {
  window.addEventListener("mousemove", e => {
    if (adminArrow.style.display === "none") return;
    const x = e.clientX;
    const y = e.clientY;
    adminArrow.style.left = x + "px";
    adminArrow.style.top  = y + "px";

    const dx = x - window.innerWidth / 2;
    const dy = y - window.innerHeight / 2;
    const angle = Math.atan2(dy, dx) * (180 / Math.PI);
    adminArrow.style.transform =
      `translate(-50%, -50%) rotate(${angle}deg)`;
  });
}

/* ===========================
   START BUTTON
   =========================== */

startBtn.addEventListener("click", () => {
  startGame();
});

/* ===========================
   ON LOAD
   =========================== */

window.addEventListener("load", () => {
  initWorldMap();
  initUsaMap();
  updateScore();
  updateRemainingList();
  if (worldSvg) zoomToIds(worldSvg, worldIds);
  loadBestScores();
  currentMode = "Practice";
  if (modeSelect) modeSelect.value = "Practice";
  modeLabel.textContent = currentMode;
  updateAdminArrowVisibility();
});
</script>
